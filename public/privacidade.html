<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacidade e Perfil - MQ Finance</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/registo_privacidade.css">
</head>
<body>
    <div id="mensagem-sucesso" class="mensagem-sucesso">
        ✅ Dados guardados com sucesso!
    </div>
    <div id="chuva-dinheiro"></div>

    <div class="menu-container">
        <div class="caixa-privacidade">
            <h1 class="titulo-registo">O Seu Perfil ⚙️</h1>
            <p class="frase-confianca">Aqui pode alterar os seus dados a qualquer momento.</p>

            <div style="text-align: center; margin-bottom: 20px;">
                <label for="upload-foto" class="label-avatar" title="Clique para mudar a fotografia">
                    <div class="avatar" id="avatar-preview-privacidade" style="width: 120px; height: 120px; line-height: 150px; font-size: 6rem; margin: 0 auto;">👤</div>
                    <div class="icone-editar-foto" style="bottom: 5px; right: 230px;">📷</div>
                </label>
                <input type="file" id="upload-foto" accept="image/*" style="display: none;">
            </div>

            <form id="formulario-privacidade" novalidate>
                <div class="grupo-input">
                    <label for="edit-nome">Nome Completo:</label>
                    <input type="text" id="edit-nome" required autocomplete="off">
                </div>
                <p id="idade-jogador">
                    Idade: -- anos
                </p>

                <div class="grupo-input">
                    <label for="edit-data">Data de Nascimento:</label>
                    <input type="date" id="edit-data" required>
                </div>

                <button type="submit" class="btn-avancar" id="btn-guardar-perfil">💾 Guardar Alterações</button>
                
                <button type="button" class="btn-voltar" onclick="window.location.href='menu_jogos.html'">
                    ⬅ Voltar ao Menu
                </button>
            </form>
        </div>
    </div>
    <div id="mensagem-erro" class="mensagem-erro">
        ⚠️ Por favor, escreva o seu nome completo.
    </div>

    <script src="js/ui.js"></script>
    <script src="js/perfil.js"></script>
    <script src="js/configuracoes.js"></script>
    <script src="js/utils.js"></script>
</body>
</html>
