<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Mealheiro - MQ Finance</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/jogo_moedas.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="chuva-dinheiro"></div>

    <div class="menu-container">
        <div class="caixa-privacidade" style="text-align: center; max-width: 800px; width: 100%;">
            
            <div class="cabecalho-folha" style="border-bottom: 2px dashed rgba(255,255,255,0.2);">
                <h2 style="color: #3BA7B1; font-size: 2.8rem; margin: 0;">O Mealheiro 🐖</h2>
                <span class="etiqueta-nivel" style="background: #fdcb6e; color: #2d3436;">Nível 2: Somar</span>
            </div>

            <p style="color: #F0F8FF; font-size: 1.8rem; margin-top: 20px; margin-bottom: 5px;">Quanto dinheiro está na mesa?</p>
            <p class="dica-interacao">👆 Pode arrastar para ver melhor as moedas</p>

            <div id="canvas-container" style="height: 350px;"></div>

            <div id="mensagem-moeda" style="font-size: 1.8rem; font-weight: bold; height: 30px; margin-bottom: 20px;"></div>

            <div class="grelha-niveis" id="zona-botoes" style="gap: 15px; margin-bottom: 20px; justify-content: center;">
                </div>

            <button class="btn-corrigir" id="btn-proximo" style="display: none; background: #00b894; box-shadow: 0px 6px 0px #008f73; margin-bottom: 12px;" onclick="gerarNovoDesafioN2()">Próximo Desafio ➡️</button>
            <button class="btn-voltar" onclick="window.location.href='niveis_moedas.html'">⬅ Mudar de Nível</button>
        </div>
    </div>

    <script src="js/jogo_moedas_n2.js"></script>
</body>
</html>
