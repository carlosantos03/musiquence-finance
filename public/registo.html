<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificação - MQ Finance</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/registo_privacidade.css">
</head>
<body>
    <div id="chuva-dinheiro"></div>

    <div class="menu-container">
        <div class="caixa-registo">
            <h1 class="titulo-registo">Quem vai jogar hoje? 👤</h1>
            <p class="frase-confianca">Para podermos guardar todos os seus progressos!</p>

            <form id="formulario-jogador" novalidate>
                
                <div class="grupo-input">
                    <label for="nome-jogador-input">O seu Nome Completo:</label>
                    <input type="text" id="nome-jogador-input" placeholder="Ex: Carlos Miguel Moniz dos Santos" required autocomplete="off">
                </div>

                <div class="grupo-input">
                    <label for="data-nascimento">Data de Nascimento:</label>
                    <input type="date" id="data-nascimento" required>
                </div>

                <button type="submit" class="btn-avancar">CONTINUAR ➔</button>
            </form>
        </div>
    </div>

    <div id="mensagem-erro" class="mensagem-erro">
        ⚠️ Por favor, escreva o seu nome completo.
    </div>

    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
